version: v1.0
name: Remote.it Agent Continuous Install
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2004
blocks:
  - name: Run Installer for 1 Hour
    task:
      jobs:
        - name: Install remote.it agent continuously
          commands:
            - checkout
            - |
              echo "Starting continuous run for 1 hour..."
              # Set the end time to 3600 seconds (1 hour) from now.
              end_time=$((SECONDS + 3600))

              # Loop until the current time exceeds the end time.
              while [ $SECONDS -lt $end_time ]; do
                echo "Executing remote.it installation script..."

                # The registration code is now defined inline with the command.
                R3_REGISTRATION_CODE="55EC315E-BF92-5164-BAB5-624903D7BEF2" \
                sh -c "$(curl -L https://downloads.remote.it/remoteit/install_agent.sh)"

                echo "Installation attempt finished. Waiting for 60 seconds..."
                sleep 60
              done

              echo "Finished 1-hour continuous run."
          parallelism: 5
