version: v1.0
name: Remoteit Agent Parallel Run
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2004
blocks:
  - name: Run 5 Remoteit Agents in Parallel
    task:
      jobs:
        - name: Run remoteit-agent
          commands:
            - 'docker run -d \ -e R3_REGISTRATION_CODE="CCBA8172-0183-51AC-8CDC-E3EB60E1DF4C" \ --restart unless-stopped \ --pull always \ remoteit/remoteit-agent:latest'
            - while true; do sleep 60; done
          parallelism: 5
      parallel: 5
