version: v1.0
name: ''
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2004
jobs:
  run-remoteit-agent:
    machine:
      image: 'ubuntu-2204:current'
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Start remote.it Agent in Docker
          command: |
            echo "Starting remote.it agent..."
            # The Docker command pulls the latest image and starts the container.
            # -d: Run in detached mode (in the background).
            # -e: Pass the registration code as an environment variable.
            #     We use a CircleCI environment variable for security.
            # --restart unless-stopped: Ensures the container restarts if it
            #     crashes, but not if you manually stop it.
            # --pull always: Ensures you always run the latest version of the agent.
            docker run -d \
              -e R3_REGISTRATION_CODE="$REMOTEIT_REGISTRATION_CODE" \
              --restart unless-stopped \
              --pull always \
              remoteit/remoteit-agent:latest
      - run:
          name: Keep Job Alive
          command: |
            echo "Agent container started successfully."
            echo "This job will now run indefinitely to keep the host VM alive."
            echo "To stop the agent, you must manually cancel this workflow in the CircleCI UI."
            # 'sleep infinity' is a simple command that never exits,
            # which prevents the CircleCI job from finishing and shutting down the VM.
            sleep infinity
workflows:
  deploy-remoteit-agents:
    when:
      equal:
        - main
        - << pipeline.git.branch >>
    jobs:
      - run-remoteit-agent:
          parallelism: 5
blocks: []
