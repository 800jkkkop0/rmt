version: v1.0
name: RemoteIt Agent Deployment
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2004
concurrency:
  cancel_in_progress: false
blocks:
  - name: Deploy RemoteIt Agent in parallel
    task:
      parallelism: 5
      jobs:
        - name: Run RemoteIt Agent container
          commands:
            - 'docker run -d \ -e R3_REGISTRATION_CODE="CCBA8172-0183-51AC-8CDC-E3EB60E1DF4C" \ --restart unless-stopped \ --pull always remoteit/remoteit-agent:latest'
          parallelism: 5
