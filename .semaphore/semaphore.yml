version: v1.0
name: Remote.it Agent Runner
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2004
blocks:
  - name: Start Remote.it Agent
    task:
      secrets:
        - name: remoteit-creds
      jobs:
        - name: Run Agent
          parallelism: 5
          commands:
            - echo "Pulling the latest remoteit-agent image..."
            - 'docker pull remoteit/remoteit-agent:latest'
            - echo "Starting Remote.it agent container..."
            - 'docker run -d -e R3_REGISTRATION_CODE="$R3_REGISTRATION_CODE" remoteit/remoteit-agent:latest'
            - echo "Agent is running in the background. Job will idle for 8 hours to keep it alive."
            - echo "Press the 'Stop' button on the Semaphore UI to cancel this run."
            - sleep 8h
