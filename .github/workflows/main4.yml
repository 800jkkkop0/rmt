name: Parallel 1-5 (Getscreen + GoLogin)

on:
  workflow_dispatch:
    inputs:
      target_os:
        description: 'Select Operating System'
        required: true
        type: choice
        options:
          - 'windows'
          - 'macos'
        default: 'windows'
      windows_version:
        description: 'Windows Version (Only used if OS is windows)'
        required: true
        type: choice
        options:
          - 'windows-2025'
          - 'windows-2022'
          - 'windows-11-arm'
        default: 'windows-2025'
      macos_version:
        description: 'macOS Version (Only used if OS is macos)'
        required: true
        type: choice
        options:
          - 'macos-13'
          - 'macos-14'
          - 'macos-15'
          - 'macos-26'
          - 'macos-26-intel'
        default: 'macos-15'
      getscreen_email:
        description: 'Getscreen.me Account Email (Required)'
        required: true
        type: string
      gologin_email:
        description: 'GoLogin Account Email (Required)'
        required: true
        type: string
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '1'
      save_as_default:
        description: 'Save as default for future runs (UI Checkbox)'
        required: false
        type: boolean
        default: false

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate Dynamic Matrix
        id: set-matrix
        shell: python
        env:
          TARGET_OS: ${{ inputs.target_os }}
          WINDOWS_VERSION: ${{ inputs.windows_version }}
          MACOS_VERSION: ${{ inputs.macos_version }}
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
        run: |
          import os, json
          target_os = os.environ.get("TARGET_OS", "windows").lower()
          email = os.environ.get("EMAIL", "").strip()
          num_devices = int(os.environ.get("NUM_DEVICES", "1"))
          
          includes =[]
          
          # Logic to pick the correct version string based on chosen OS
          if target_os == "windows":
              os_version = os.environ.get("WINDOWS_VERSION", "windows-2025")
              short_os = os_version.replace("windows-", "")
              prefix = "Win"
          else:
              os_version = os.environ.get("MACOS_VERSION", "macos-15")
              short_os = os_version.replace("macos-", "")
              prefix = "mac"
              
          if email:
              # Generate standard arrays
              for i in range(1, num_devices + 1):
                  includes.append({
                      "device": f"{i}-{prefix}-{short_os}", 
                      "email": email,
                      "os": os_version
                  })
                  
          if not includes:
              print("Error: Valid configuration could not be generated. Exiting.")
              exit(1)
              
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")

  remote_session:
    name: Remote Session ${{ matrix.device }}
    needs: prepare_matrix
    # Dynamically select the runner OS chosen by the user
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      # ================= WINDOWS SPECIFIC STEPS =================
      - name: Install and Start Getscreen.me (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Downloading Getscreen.me Agent..."
          Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi"
          
          $DeviceName = "${{ matrix.device }}"
          Write-Host "Installing and linking Getscreen.me for Device $DeviceName..."
          
          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ matrix.email }}`" CONFIG=`"name='$DeviceName' autostart=true nonadmin=true control=true disable_confirmation=true`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs
          
          Write-Host "✅ Getscreen.me is configured and running."
          
      - name: Download, Install, and Open GoLogin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Downloading GoLogin for Windows..."
          Invoke-WebRequest -Uri "https://dl.gologin.com/gologin.exe" -OutFile "gologin_installer.exe"
          
          Write-Host "Installing GoLogin..."
          Start-Process -FilePath ".\gologin_installer.exe" -ArgumentList "/S" -Wait
          
          Write-Host "Launching GoLogin..."
          Start-Process "$env:USERPROFILE\AppData\Local\Programs\GoLogin\GoLogin.exe"
          
          Write-Host "✅ GoLogin installed and opened!"
          
      - name: Automate GoLogin Login (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: "11223344"
        run: |
          Write-Host "Installing Python UI Automation tools..."
          pip install pyautogui pygetwindow
          
          Write-Host "Running Automation Script..."
          python -c "
          import pyautogui
          import pygetwindow as gw
          import time
          import os
          
          print('Waiting 15 seconds for GoLogin window to appear...')
          time.sleep(15)
          
          windows = gw.getWindowsWithTitle('Gologin')
          if windows:
              win = windows[0]
              try:
                  win.activate()
                  win.maximize()
              except:
                  pass
              time.sleep(3)
              
              print('Navigating to Login page...')
              pyautogui.press('tab', presses=8, interval=0.5)
              pyautogui.press('enter')
              
              time.sleep(4)
              
              print('Entering credentials...')
              pyautogui.write(os.environ['GOLOGIN_EMAIL'])
              pyautogui.press('tab')
              
              pyautogui.write(os.environ['GOLOGIN_PASSWORD'])
              pyautogui.press('enter')
              
              print('✅ Login automated successfully.')
          else:
              print('❌ Could not find GoLogin window.')
          "

      # ================= MACOS SPECIFIC STEPS =================
      - name: Setup GUI Authorization Credentials (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Creating 'admin' user with password 'admin'..."
          sudo sysadminctl -addUser admin -password admin -admin || true
          
          echo "Setting default runner password to 'admin' as well..."
          sudo sysadminctl -adminUser "$USER" -password admin || true
          
          echo "✅ Credentials configured. You can now authorize macOS GUI prompts with Username: admin / Password: admin"

      - name: Install, Bypass Security, and Start Getscreen.me (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Downloading Getscreen.me Agent for macOS..."
          curl -L -o getscreen.dmg "https://getscreen.me/download/getscreen.dmg"
          
          DeviceName="${{ matrix.device }}"
          
          echo "Mounting DMG..."
          hdiutil attach getscreen.dmg -mountpoint /Volumes/getscreen -nobrowse -quiet
          
          APP_PATH=$(find /Volumes/getscreen -maxdepth 1 -name "*.app" | head -n 1)
          APP_NAME=$(basename "$APP_PATH")
          
          echo "Copying $APP_NAME to /Applications..."
          sudo cp -R "$APP_PATH" /Applications/
          hdiutil detach /Volumes/getscreen -quiet -force
          
          echo "Bypassing macOS Screen Recording & Accessibility Prompts..."
          APP_BUNDLE_ID=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleIdentifier)
          
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" || true
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" || true
          
          EXEC_NAME=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleExecutable)
          EXEC_PATH="/Applications/$APP_NAME/Contents/MacOS/$EXEC_NAME"
          
          echo "Registering and Starting Getscreen.me..."
          sudo "$EXEC_PATH" -install || true
          sudo "$EXEC_PATH" -register "${{ matrix.email }}"
          sudo "$EXEC_PATH" -config "name='$DeviceName' autostart=true nonadmin=true control=true disable_confirmation=true"
          sudo "$EXEC_PATH" -start || true
          echo "✅ Getscreen.me is running! Device Name set to: $DeviceName"
          
      - name: Download, Install, and Open GoLogin (macOS)
        if: runner.os == 'macOS'
        run: |
          OS_VERSION="${{ matrix.os }}"
          
          if [[ "$OS_VERSION" == "macos-13" || "$OS_VERSION" == "macos-26-intel" ]]; then
              echo "Downloading GoLogin Intel (x64) for $OS_VERSION..."
              curl -L -o gologin.dmg "https://dl.gologin.com/gologin.dmg"
          else
              echo "Downloading GoLogin ARM64 for Apple Silicon ($OS_VERSION)..."
              curl -L -o gologin.dmg "https://dl.gologin.com/gologin-arm64.dmg"
          fi
          
          echo "Mounting GoLogin DMG..."
          hdiutil attach gologin.dmg -mountpoint /Volumes/gologin -nobrowse -quiet
          
          echo "Installing GoLogin to Applications..."
          sudo cp -R /Volumes/gologin/GoLogin.app /Applications/
          hdiutil detach /Volumes/gologin -quiet -force
          
          echo "Launching GoLogin..."
          open /Applications/GoLogin.app
          
          echo "✅ GoLogin installed and opened!"
          
      - name: Automate GoLogin Login (macOS)
        if: runner.os == 'macOS'
        env:
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: "11223344"
        run: |
          echo "Injecting Accessibility permissions for osascript and System Events..."
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '/usr/bin/osascript', 1, 2, 4, 1, 0);" || true
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', 'com.apple.systemevents', 0, 2, 4, 1, 0);" || true
          
          echo "Waiting 20 seconds for GoLogin to completely render..."
          sleep 20
          
          echo "Automating keystrokes using AppleScript (Clipboard Method)..."
          osascript <<'EOF'
          set userEmail to system attribute "GOLOGIN_EMAIL"
          set userPass to system attribute "GOLOGIN_PASSWORD"
          
          tell application "System Events"
              tell application "GoLogin" to activate
              delay 3
              
              repeat 8 times
                  key code 48 -- Tab key
                  delay 0.5
              end repeat
              
              -- Press ENTER to switch to the Log In tab
              key code 36 
              delay 4
              
              -- Paste Email safely via clipboard
              set the clipboard to userEmail
              delay 0.5
              keystroke "v" using command down
              delay 1
              
              -- Press TAB to move to Password field
              key code 48
              delay 1
              
              -- Paste Password safely via clipboard
              set the clipboard to userPass
              delay 0.5
              keystroke "v" using command down
              delay 1
              
              -- Press ENTER to trigger Login
              key code 36
              delay 5
          end tell
          EOF
          
          echo "✅ Login automation completed."

      # ================= KEEP ALIVE (SHARED BUT SPLIT BY SHELL) =================
      - name: Keep Runner Alive (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Session is active. This runner will remain online until the job timeout is reached."
          Start-Sleep -Seconds 3600

      - name: Keep Runner Alive (macOS)
        if: always() && runner.os == 'macOS'
        run: |
          echo "Session is active. This runner will remain online until the job timeout is reached."
          sleep 3600
