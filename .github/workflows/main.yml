name: Parallel 1-5 (GetScrn Windows + GoLogin)

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Windows OS Version'
        required: true
        type: choice
        options:
          - 'windows-2025'
          - 'windows-2022'
          - 'windows-11-arm'
        default: 'windows-2022'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@justzeus.com' # Do not remove the single quotes
      gologin_email:
        description: 'GoLogin Account Email'
        required: true
        type: string
        default: 'ki18@mnb.net' # Do not remove the single quotes
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '5'

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }} # Uses the PAT so it can push to .github/workflows/

      - name: Generate Dynamic Matrix
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          OS_VERSION: ${{ inputs.os_version }}
        run: |
          import os, json
          email = os.environ.get("EMAIL", "").strip()
          num_devices = int(os.environ.get("NUM_DEVICES", "1"))
          os_version = os.environ.get("OS_VERSION", "windows-2025")
          
          short_os = os_version.replace("windows-", "")
          
          includes =[]
          if email:
              for i in range(1, num_devices + 1):
                  includes.append({
                      "device": f"{i}-Win-{short_os}", 
                      "email": email,
                      "os": os_version
                  })
                  
          if not includes:
              print("Error: Valid configuration could not be generated. Exiting.")
              exit(1)
              
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")

      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION: ${{ inputs.os_version }}
          GETSCREEN_EMAIL: ${{ inputs.getscreen_email }}
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
        run: |
          import re
          import os

          # ⚠️ UPDATE THIS TO YOUR EXACT WORKFLOW FILE NAME ⚠️
          file_path = ".github/workflows/main.yml" 
          
          with open(file_path, "r") as f:
              content = f.read()

          def update_default(input_name, new_val):
              global content
              # Finds the specific input block and safely replaces the string inside the default: '...'
              pattern = r"(" + input_name + r":[\s\S]*?default:\s*')[^']*(')"
              content = re.sub(pattern, rf"\g<1>{new_val}\g<2>", content, count=1)

          update_default("os_version", os.environ.get("OS_VERSION"))
          update_default("getscreen_email", os.environ.get("GETSCREEN_EMAIL"))
          update_default("gologin_email", os.environ.get("GOLOGIN_EMAIL"))
          update_default("num_devices", os.environ.get("NUM_DEVICES"))

          with open(file_path, "w") as f:
              f.write(content)

      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/
          # Only commits if the inputs actually changed to avoid empty commits
          # [skip ci] prevents this commit from triggering another workflow run automatically
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last used inputs [skip ci]" && git push)

  remote_session:
    name: Remote Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      - name: Install and Start Getscreen.me
        shell: pwsh
        run: |
          Write-Host "Downloading Getscreen.me Agent..."
          Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi"
          
          $DeviceName = "${{ matrix.device }}"
          Write-Host "Installing and linking Getscreen.me for Device $DeviceName..."
          
          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ matrix.email }}`" CONFIG=`"name='$DeviceName' autostart=true nonadmin=true control=true disable_confirmation=true`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs
          
          Write-Host "✅ Getscreen.me is configured and running."
          
      - name: Download, Install, and Open GoLogin
        shell: pwsh
        run: |
          Write-Host "Downloading GoLogin for Windows..."
          Invoke-WebRequest -Uri "https://dl.gologin.com/gologin.exe" -OutFile "gologin_installer.exe"
          
          Write-Host "Installing GoLogin..."
          Start-Process -FilePath ".\gologin_installer.exe" -ArgumentList "/S" -Wait
          
          Write-Host "Launching GoLogin..."
          Start-Process "$env:USERPROFILE\AppData\Local\Programs\GoLogin\GoLogin.exe"
          
          Write-Host "✅ GoLogin installed and opened!"
          
      - name: Automate GoLogin Login
        shell: pwsh
        env:
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: "11223344"
        run: |
          Write-Host "Installing Python UI Automation tools..."
          pip install pyautogui pygetwindow
          
          Write-Host "Running Automation Script..."
          python -c "
          import pyautogui
          import pygetwindow as gw
          import time
          import os
          
          print('Waiting 15 seconds for GoLogin window to appear...')
          time.sleep(15)
          
          windows = gw.getWindowsWithTitle('Gologin')
          if windows:
              win = windows[0]
              try:
                  win.activate()
                  win.maximize()
              except:
                  pass
              time.sleep(3)
              
              print('Navigating to Login page...')
              pyautogui.press('tab', presses=8, interval=0.5)
              pyautogui.press('enter')
              
              time.sleep(4)
              
              print('Entering credentials...')
              pyautogui.write(os.environ['GOLOGIN_EMAIL'])
              pyautogui.press('tab')
              
              pyautogui.write(os.environ['GOLOGIN_PASSWORD'])
              pyautogui.press('enter')
              
              print('✅ Login automated successfully.')
          else:
              print('❌ Could not find GoLogin window.')
          "
          
      - name: Keep Runner Alive
        if: always()
        shell: pwsh
        run: |
          Write-Host "Session is active. This runner will remain online until the job timeout is reached."
          Start-Sleep -Seconds 3600
